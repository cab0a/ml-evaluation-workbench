name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Check CLI and dataset
        run: |
          ml-evaluation-workbench --version
          ml-evaluation-workbench --help
          python examples/download_penguins.py --check

      - name: Run tests
        run: python -m pytest

      - name: Run controlled evaluation
        run: |
          python examples/run_demo.py --output-dir .work/generated
          python examples/run_demo.py --output-dir .work/generated --verify-only

  reproduce:
    name: Reproduce committed artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Reproduce reference artifacts
        run: |
          python examples/run_demo.py
          python examples/run_demo.py --verify-only
          git diff --exit-code -- results/
